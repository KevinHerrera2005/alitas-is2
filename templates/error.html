<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sin conexión | Alitas El Comelón</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fde8c8 0%, #fdd5a0 50%, #fbc98a 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 20px;
    }

    .card {
      background: #fffdf9;
      border-radius: 28px;
      box-shadow: 0 12px 48px rgba(180, 90, 20, 0.15);
      padding: 44px 40px 36px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 24px;
    }
    .logo-wrap img {
      width: 180px;
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(200,100,20,0.25));
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 800;
      color: #2b1a0e;
      line-height: 1.4;
      margin-bottom: 14px;
    }
    h1 span {
      color: #e8580a;
    }

    p {
      font-size: 0.93rem;
      color: #7a5c42;
      line-height: 1.7;
      margin-bottom: 30px;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      display: inline-block;
      background: #f4a090;
      color: #5c1a0a;
      border: none;
      border-radius: 50px;
      padding: 13px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      animation: pulse 2s infinite;
      text-decoration: none;
    }
    .btn:hover {
      background: #f08070;
      transform: scale(1.03);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(244,160,144,0.5); }
      50%       { box-shadow: 0 0 0 10px rgba(244,160,144,0); }
    }

    .dots {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 7px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #e8a070;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: .5; }
      40%           { transform: scale(1);   opacity: 1;  }
    }

    .countdown {
      margin-top: 10px;
      font-size: 0.78rem;
      color: #b08060;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo-wrap">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Alitas El Comelón"/>
    </div>

    <h1>Oops… en <span>Alitas el Comelón</span><br>estamos sin conexión</h1>

    <p>
      Nuestro pollito está esperando pacientemente mientras la conexión
      regresa. Estamos intentando reconectar para que el sistema vuelva a
      funcionar.
    </p>

    <a href="{{ url_for('login') }}" class="btn" id="btn">Reintentando conexión…</a>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <p class="countdown" id="countdown">Redirigiendo en <strong id="timer">15</strong>s…</p>

  </div>

  <script>
    var t = 15;
    var el = document.getElementById('timer');
    var iv = setInterval(function () {
      t--;
      if (el) el.textContent = t;
      if (t <= 0) {
        clearInterval(iv);
        window.location.href = "{{ url_for('login') }}";
      }
    }, 1000);
  </script>
</body>
</html>
