<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin conexión | Alitas el Comelón</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #FFF4D6 0%, #FFDDA6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #7A5C58;
}

.contenedor {
    width: 100%;
    max-width: 700px;
    background: rgba(255, 255, 255, 0.65);
    border: 1px solid rgba(255, 183, 165, 0.5);
    border-radius: 28px;
    padding: 36px 28px;
    text-align: center;
    box-shadow: 0 18px 45px rgba(122, 92, 88, 0.12);
    backdrop-filter: blur(6px);
}

.imagen {
    width: 100%;
    max-width: 320px;
    margin: 0 auto 24px;
    display: block;
}

.titulo {
    font-size: 2rem;
    font-weight: 800;
    color: #7A5C58;
    margin-bottom: 12px;
}

.marca {
    color: #FF8C6B;
}

.texto {
    font-size: 1.05rem;
    line-height: 1.6;
    color: #8A8A8A;
    max-width: 520px;
    margin: 0 auto 24px;
}

.estado {
    display: inline-block;
    background: #FFB7A5;
    color: #7A5C58;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 700;
}

.puntos {
    margin-top: 18px;
    display: flex;
    justify-content: center;
    gap: 8px;
}

.punto {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #CDEAC0;
    animation: latir 1.2s infinite ease-in-out;
}

.punto:nth-child(2) {
    animation-delay: 0.2s;
}

.punto:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes latir {
    0%, 80%, 100% {
        opacity: 0.35;
        transform: scale(0.8);
    }
    40% {
        opacity: 1;
        transform: scale(1);
    }
}

@media (max-width: 600px) {
    .contenedor {
        padding: 28px 20px;
    }

    .titulo {
        font-size: 1.6rem;
    }

    .texto {
        font-size: 0.98rem;
    }

    .imagen {
        max-width: 260px;
    }
}
</style>
</head>
<body>
    <div class="contenedor">
        <img src="/static/img/sinconex.png" alt="Pollo sin conexión" class="imagen">

        <h1 class="titulo">Oops... en <span class="marca">Alitas el Comelón</span> estamos sin internet</h1>

        <p class="texto">
            Nuestro pollito está esperando pacientemente mientras la conexión regresa.
            Estamos intentando reconectar para que el sistema vuelva a funcionar.
        </p>

        <div class="estado">Reintentando conexión...</div>

        <div class="puntos">
            <span class="punto"></span>
            <span class="punto"></span>
            <span class="punto"></span>
        </div>
    </div>
</body>
</html>
